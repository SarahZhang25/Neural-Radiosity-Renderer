# Training Configuration
# about 46M param
# Total Parameters: 45,670,990
# Trainable Parameters: 45,670,982
#   obj_encoder: 13,721,088 params (30.04% of total)
#   scene_transformer: 12,617,732 params (27.63% of total)
#   ray_encoder: 395,264 params (0.87% of total)
#   predictor: 18,935,882 params (41.46% of total)
#     dpt_head: 6,314,051 params (13.83% of total)

# Training: 
# Model: 
# --  camray ray encoder
# --  unified encoder -- frees up enough params for another hidden dim in pointnet
# --  uses OBB-based RoPE
# --  use 2 register tokens
# Data: dataset_uniform_chunk_0000 -- 1000 scene * 13k epochs / 128 batch size => ~100k steps


encoder:
  input_dim: 16  # Position (x,y,z) + Normal (nx,ny,nz) + Material (10)
  hidden_dims: [512, 1024, 1536, 2048]
  output_dim: 512
  backbone_dim: 768
  pooling_type: 'hierarchical' # 'hierarchical' 'max' or 'local_features'
  num_hierarchical_levels: 3 # Ignored when using local features
  use_local_patches: false

decoder:
  hidden_dim: 512
  ffn_hidden_dim: 2048 # 512 * 4???
  num_layers: 4
  num_heads: 4
  dropout: 0.0
  activation: 'gelu'
  return_all_layers: true
  use_self_attention: true # Whether to double the max frequency for RoPE.
  norm_type: 'layer_norm'
  qk_norm: true
  bias: true
  rope_double_max_freq: false
  num_register_tokens: 2

ray_encoder:
  pe_type: 'rope_obb' # RoPE handles spatial position encoding. Options: 'rope_centroid' (3D centroid), 'rope_obb' (12D OBB)
  vertex_pe_num_freqs: 8 # this controls how many frequencies are applied for the pe
  vdir_pe_type: 'camray'
  vdir_num_freqs: 4
  patch_size: 16
  norm_type: 'layer_norm'
  view_transformer_latent_dim: 512 # Must match predictor hidden_dim
  view_transformer_n_heads: 4

predictor:
  # TODO: add a obj num_freq term?
  hidden_dim: 512
  ffn_hidden_dim: 1024
  num_layers: 4
  num_heads: 4
  dropout: 0
  activation: 'gelu'
  norm_type: 'layer_norm'
  pe_type: 'rope_obb' # Options: 'rope_centroid' (3D centroid), 'rope_obb' (12D OBB), 'nerf'
  pe_num_freqs: 8 # is this redunant to vertex_pe_num_freqs? TODO: figure this out 
  use_dpt_decoder: true
  dpt_features: 128
  dpt_out_channels: [64, 128, 256, 512] 
  include_alpha: false

training:
  batch_size: 32
  learning_rate: 1.0e-4
  num_epochs: 13000
  warmup_epochs: 1300
  save_interval: 9999999  # for visualization
  checkpoint_interval: 9999999  # for saving model checkpoint 
  image_res: 64
  data_dir: "/storage/sazhang/datasets/dataset_uniform/nmr_dataset_chunk_0000.h5"
    # - "/storage/sazhang/datasets/dataset_uniform/nmr_dataset_chunk_0001.h5"
    # - "/storage/sazhang/datasets/dataset_uniform/nmr_dataset_chunk_0002.h5"
    # - "/storage/sazhang/datasets/dataset_uniform/nmr_dataset_chunk_0003.h5"
    # - "/storage/sazhang/datasets/dataset_uniform/nmr_dataset_chunk_0004.h5"
  log_dir: "training/logs/dataset_uniform_chunk_0000" #"training/logs/dataset_uniform_chunk_0000-0004"
  run_name: "params46M_camray_TESTRUN" # Optional string tag for log dir name
  # max_dataset_size: 10   # Optional max samples for dataset
  # shuffle_data: true
  # shuffle_data_seed: 42
  primary_loss: 'mae' # 'mse'
  lpips_backbone: 'alex' # 'vgg'
  lpips_loss_weighting: 0.0
  use_amp: True
  use_compile: False
  package_model: True
  num_workers: 2