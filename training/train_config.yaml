# Training Configuration

encoder:
  input_dim: 3  # Position (x,y,z)
  hidden_dims: [128, 256, 512] # Reduced for simple scene
  output_dim: 512
  backbone_dim: 512
  pooling_type: 'max' # 'hierarchical' is heavier, start simple
  num_hierarchical_levels: 3 # ignored if max

state:
  num_tokens: 64  # 4x4x4 grid
  token_dim: 512 # Match encoder output
  learnable_init: true
  init_scale: 0.02

decoder:
  hidden_dim: 512
  num_layers: 2
  num_heads: 4
  feedforward_dim: 512
  dropout: 0.1
  activation: 'gelu' # simpler than swiglu for now
  return_all_layers: true
  use_self_attention: true
  norm_type: 'layer_norm'
  qk_norm: false
  num_register_tokens: 0

ray_encoder:
  pe_type: 'nerf' # simpler than rope for ray queries initially
  vertex_pe_num_freqs: 6
  vdir_pe_type: 'nerf'
  vdir_num_freqs: 4
  patch_size: 16
  norm_type: 'layer_norm'
  view_transformer_latent_dim: 512 # Must match predictor hidden_dim
  view_transformer_n_heads: 4

predictor:
  hidden_dim: 512
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  activation: 'gelu'
  norm_type: 'layer_norm'

training:
  batch_size: 4
  learning_rate: 1.0e-4
  num_epochs: 200
  save_interval: 10
  image_res: 128
  data_dir: "data_generation/output/renders"
  log_dir: "training/logs"
  checkpoint_dir: "training/checkpoints"
