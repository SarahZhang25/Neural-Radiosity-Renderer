# Training Configuration
# about 46M param
# Total Parameters: 44,827,458
# Trainable Parameters: 44,827,450
#   obj_encoder: 12,877,556 params (28.73% of total)
#   scene_transformer: 12,617,732 params (28.15% of total)
#   ray_encoder: 395,264 params (0.88% of total)
#   predictor: 18,935,882 params (42.24% of total)
#     dpt_head: 6,314,051 params (14.09% of total)

# Training: 
# Model: 
# --  using LitePT-S instad of PointNet. RE # params: a bit undersized ATM because using default LitePT-S arch. 
# --  camray ray encoder 
# --  unified encoder
# --  uses OBB-based RoPE
# --  use 2 register tokens
# Data: ds2_chairs1-3_cbox0-3 -- 20k epochs 
# -- compare with last run 20260702-012914_full_ds_params46M_unified_encoder_ropeOBB_regtokens2 

encoder_type: 'litept'
litept_encoder:
  in_channels: 16  # Position (3) + Normal (3) + Material (10)
  out_channels: 512  # Must match decoder.hidden_dim for the object token projection
  pooling_type: 'hierarchical'
  num_hierarchical_levels: 3
  pretrained_weights_path: null  # Set to path of LitePT-S.pth to load pretrained weights
  drop_path: 0.2
  stride: [2, 2, 2, 2]
  enc_depths: [2, 2, 2, 6, 2]
  enc_channels: [36, 72, 144, 252, 504]
  enc_num_head: [2, 4, 8, 14, 28]
  enc_patch_size: [1024, 1024, 1024, 1024, 1024]
  enc_conv: [True, True, True, False, False]
  enc_attn: [False, False, False, True, True]
  enc_rope_freq: [100.0, 100.0, 100.0, 100.0, 100.0]

decoder:
  hidden_dim: 512
  ffn_hidden_dim: 2048 # 512 * 4???
  num_layers: 4
  num_heads: 4
  dropout: 0.0
  activation: 'gelu'
  return_all_layers: true
  use_self_attention: true # Whether to double the max frequency for RoPE.
  norm_type: 'layer_norm'
  qk_norm: true
  bias: true
  rope_double_max_freq: false
  num_register_tokens: 2

ray_encoder:
  pe_type: 'rope_obb' # RoPE handles spatial position encoding. Options: 'rope_centroid' (3D centroid), 'rope_obb' (12D OBB)
  vertex_pe_num_freqs: 8 # this controls how many frequencies are applied for the pe
  vdir_pe_type: 'camray'
  vdir_num_freqs: 4
  patch_size: 16
  norm_type: 'layer_norm'
  view_transformer_latent_dim: 512 # Must match predictor hidden_dim
  view_transformer_n_heads: 4

predictor:
  # TODO: add a obj num_freq term?
  hidden_dim: 512
  ffn_hidden_dim: 1024
  num_layers: 4
  num_heads: 4
  dropout: 0
  activation: 'gelu'
  norm_type: 'layer_norm'
  pe_type: 'rope_obb' # Options: 'rope_centroid' (3D centroid), 'rope_obb' (12D OBB), 'nerf'
  pe_num_freqs: 8 # is this redunant to vertex_pe_num_freqs? TODO: figure this out 
  use_dpt_decoder: true
  dpt_features: 128
  dpt_out_channels: [64, 128, 256, 512]
  include_alpha: false

training:
  batch_size: 64
  learning_rate: 1.0e-4
  num_epochs: 20000
  warmup_epochs: 2000
  save_interval: 250  # for visualization
  checkpoint_interval: 2000  # for saving model checkpoint 
  image_res: 128
  data_dir: "renderformer/datasets/processed_datasets/ds2_chairs1-3_cbox0-3"
  log_dir: "training/logs/rf_ds2_chairs1-3_cbox0-3"
  run_name: "full_ds_params46M_litePT-S" # Optional string tag for log dir name
  # max_dataset_size: 10   # Optional max samples for dataset
  # shuffle_data: true
  # shuffle_data_seed: 42
  primary_loss: 'mae' # 'mse'
  lpips_backbone: 'alex' # 'vgg'
  lpips_loss_weighting: 0.05
  use_amp: True
  use_compile: False
  package_model: True
  num_workers: 32